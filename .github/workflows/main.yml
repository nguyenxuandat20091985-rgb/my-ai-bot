name: AI Auto Run

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  run-ai:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Run Script
        env:
          MY_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Kết nối tới AI..."
          # Dòng dưới đây giúp tạo file log để Git luôn có cái để lưu
          echo "Bot run at $(date)" > run_log.txt
          # Anh để các lệnh chạy Python của anh ở đây, ví dụ:
          # python script_cua_anh.py

      - name: Push Code
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Auto generated code" || echo "Nothing to commit"
          git push
