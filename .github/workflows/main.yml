name: AI Auto Run

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  run-ai:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Run Script
        env:
          MY_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py

      - name: Push Code
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          # Kiểm tra nếu có thay đổi thì mới commit và push, tránh lỗi khi không có gì mới
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto generated code" && git push)
